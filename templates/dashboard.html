<!doctype html>
<html lang="en" data-theme="{{THEME}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
/*
 * One shell, both themes. Light = quantitative one-pager; dark =
 * narrative field report. Themes differ only in the CSS
 * variables below — every chart fill/stroke references a var, so no
 * re-render is needed to switch. Edit visuals here, not in Python.
 *
 * Rendered into a fully self-contained HTML file: this CSS and the script
 * at the bottom are inlined into the output, so dashboards open offline
 * with zero external requests.
 */
*{box-sizing:border-box;}
:root{
  --bg:#f5f7f9;--card:#ffffff;--fg:#161b21;--muted:#697480;
  --line:#e7ebf0;--me:#0d9488;--other:#ef8a3c;--accent:#0d9488;
  --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);--radius:16px;
}
[data-theme="dark"]{
  --bg:#0a0d10;--card:#11161b;--fg:#eaf2ef;--muted:#9fb0aa;
  --line:rgba(255,255,255,.10);--me:#7dd3fc;--other:#f8d36b;--accent:#a7f3d0;
  --shadow:0 18px 50px rgba(0,0,0,.35);
}
body{margin:0;background:var(--bg);color:var(--fg);line-height:1.5;
  font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;}
.container{width:min(1180px,calc(100vw - 32px));margin:0 auto;padding:30px 0 60px;}
.header{padding:8px 0 24px;}
.eyebrow{text-transform:uppercase;letter-spacing:.16em;font-size:.72rem;font-weight:800;color:var(--accent);margin-bottom:10px;}
.header h1{font-size:clamp(1.7rem,4vw,2.7rem);letter-spacing:-.035em;margin:0 0 8px;line-height:1.05;}
.header .meta{color:var(--muted);font-size:.95rem;}
.thesis{border-left:3px solid var(--accent);padding-left:14px;margin-top:18px;font-size:1.05rem;max-width:820px;}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.kpi .num{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;letter-spacing:-.04em;}
.kpi .label{color:var(--muted);font-size:.84rem;margin-top:6px;}
.kpi .sub{color:var(--muted);opacity:.85;font-size:.76rem;margin-top:8px;}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);min-width:0;}
.card.wide{grid-column:1 / -1;}
.card h3{margin:0 0 4px;font-size:1.05rem;letter-spacing:-.02em;}
.card .csub{color:var(--muted);font-size:.82rem;margin:0 0 16px;}
.bars{display:flex;flex-direction:column;gap:9px;}
.bar{display:grid;grid-template-columns:88px 1fr 56px;align-items:center;gap:10px;font-size:.85rem;}
.bar-label{color:var(--muted);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{background:rgba(127,127,127,.16);border-radius:7px;height:14px;overflow:hidden;}
.bar-fill{display:block;height:100%;border-radius:7px;}
.bar-val{font-variant-numeric:tabular-nums;}
.fill-me{background:var(--me);}.fill-other{background:var(--other);}
.svg-me{fill:var(--me);}.svg-other{fill:var(--other);}
.stroke-me{stroke:var(--me);}.stroke-other{stroke:var(--other);}
.legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:.82rem;margin-top:14px;}
.legend i,.share-row i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:-1px;}
.dot-me{background:var(--me);}.dot-other{background:var(--other);}
.share-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.donut-num{font-size:26px;font-weight:800;fill:var(--fg);}
.share-legend{display:flex;flex-direction:column;gap:12px;}
.share-row{display:flex;align-items:baseline;gap:8px;}
.share-row b{font-size:1.15rem;}
.grouped{display:flex;flex-direction:column;gap:16px;}
.grp{display:flex;flex-direction:column;gap:5px;}
.grp .glabel{color:var(--muted);font-size:.8rem;font-weight:600;}
.bigstat{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;letter-spacing:-.04em;}
.bigstat-sub{color:var(--muted);font-size:.85rem;margin-top:8px;}
.month-svg{width:100%;height:auto;display:block;}
.axis{fill:var(--muted);font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
.footer{margin-top:36px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font-size:.82rem;}
.section{margin-top:34px;}
.section h2{font-size:clamp(1.4rem,3vw,2rem);letter-spacing:-.03em;margin:0 0 16px;}
.prose{max-width:820px;}.prose p{margin:0 0 12px;}.prose li{margin:0 0 8px;}
.glist{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);}
.tcard .kicker{color:var(--accent);text-transform:uppercase;letter-spacing:.13em;font-size:.7rem;font-weight:800;margin-bottom:8px;}
.tcard h4{margin:0 0 8px;letter-spacing:-.02em;}
.tcard p{margin:0;color:var(--muted);font-size:.92rem;}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.chip{background:rgba(127,127,127,.14);color:var(--accent);border-radius:999px;padding:4px 9px;font-size:.74rem;font-weight:700;}
.arc{display:grid;gap:14px;}
.arc article{border-left:2px solid var(--line);padding-left:14px;}
.arc .when{color:var(--accent);font-size:.74rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px;}
.arc h4{margin:0 0 4px;}
.moment{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}
.moment h4{margin:0 0 10px;}
blockquote{margin:0;border-left:2px solid var(--other);padding:8px 0 8px 14px;background:rgba(127,127,127,.06);border-radius:0 10px 10px 0;}
blockquote p{margin:0;}
blockquote cite{display:block;color:var(--muted);font-size:.78rem;margin-top:8px;font-style:normal;}
.search{width:min(440px,100%);background:var(--card);border:1px solid var(--line);color:var(--fg);border-radius:999px;padding:11px 16px;outline:none;margin-bottom:16px;font-size:.92rem;}
.kv{display:grid;gap:8px;margin:0;}
.kv div{display:flex;justify-content:space-between;gap:16px;border-top:1px solid var(--line);padding-top:8px;}
.kv dt{color:var(--muted);}.kv dd{margin:0;font-weight:700;}
@media(max-width:720px){.kpis{grid-template-columns:repeat(2,1fr);}.cards{grid-template-columns:1fr;}}
</style>
</head>
<body>
{{BODY}}
<script>
/* Live filter for the "moments" list (narrative dashboards only). Self-
   guards: a no-op when there is no #momentSearch, so it is harmless on
   quantitative dashboards. */
(function(){
  var s=document.getElementById('momentSearch');
  if(!s)return;
  var cards=[].slice.call(document.querySelectorAll('.moment'));
  s.addEventListener('input',function(){
    var q=s.value.toLowerCase();
    cards.forEach(function(c){
      c.style.display=c.textContent.toLowerCase().indexOf(q)>-1?'':'none';
    });
  });
})();
</script>
</body>
</html>
